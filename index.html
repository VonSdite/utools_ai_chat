<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkMind</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <img src="logo.svg" alt="" class="brand-logo" />
          <strong>MarkMind</strong>
        </div>
        <nav class="side-tabs" aria-label="功能">
          <button class="side-tab is-active" type="button" data-tab="translate">翻译</button>
          <button class="side-tab" type="button" data-tab="summary">总结</button>
          <button class="side-tab" type="button" data-tab="explain">解释</button>
          <button class="side-tab" type="button" data-tab="chat">对话</button>
        </nav>
        <button class="side-tab settings-tab" type="button" data-tab="settings">设置</button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="title-block">
            <h1 id="viewTitle">翻译</h1>
            <p id="modelBadge">未配置模型</p>
          </div>
          <span id="statusText" class="status-pill">就绪</span>
        </header>

        <main class="main">
          <section class="view is-active" id="taskView">
            <section class="input-panel">
              <div class="mode-model-row">
                <select id="taskModelSelect" class="mode-model-select" aria-label="当前模型"></select>
              </div>
              <textarea id="inputText" spellcheck="false" placeholder="输入内容"></textarea>
              <div id="taskAttachments" class="attachment-list"></div>
              <div class="action-row">
                <input id="taskFileInput" type="file" multiple hidden />
                <button id="taskAttachBtn" class="icon-btn" type="button" title="添加附件" aria-label="添加附件">+</button>
                <button id="sendTaskBtn" class="primary-btn" type="button">发送</button>
                <button id="stopTaskBtn" class="icon-btn" type="button" title="停止" aria-label="停止" disabled>■</button>
                <button id="clearTaskBtn" class="icon-btn" type="button" title="清空" aria-label="清空">×</button>
              </div>
            </section>

            <section class="output-panel">
              <div class="panel-head">
                <h2>输出</h2>
                <button id="copyTaskBtn" class="icon-btn compact-btn" type="button" title="复制" aria-label="复制" disabled>⧉</button>
              </div>
              <pre id="resultText" class="result-text">等待输入</pre>
            </section>
          </section>

          <section class="view" id="chatView">
            <aside class="sessions-panel">
              <section id="assistantSection" class="assistant-section">
                <div class="sidebar-section-head">
                  <button id="assistantToggleBtn" class="assistant-toggle" type="button" aria-expanded="false">
                    <span>助手</span>
                    <strong id="currentAssistantName">默认助手</strong>
                  </button>
                  <button id="newAssistantBtn" class="icon-btn compact-btn" type="button" title="新建助手" aria-label="新建助手">+</button>
                </div>
                <div id="assistantsList" class="assistants-list"></div>
                <div class="assistant-editor">
                  <label class="field">
                    <span>名称</span>
                    <input id="assistantNameInput" />
                  </label>
                  <label class="field">
                    <span>Prompt</span>
                    <textarea id="assistantPromptInput" spellcheck="false"></textarea>
                  </label>
                </div>
              </section>

              <section class="topic-section">
                <div class="sidebar-section-head">
                  <span>话题</span>
                  <button id="newSessionBtn" class="icon-btn compact-btn" type="button" title="新建话题" aria-label="新建话题">+</button>
                </div>
                <div id="sessionsList" class="sessions-list"></div>
              </section>
            </aside>

            <section class="chat-panel">
              <div id="messagesList" class="messages-list"></div>
              <div class="chat-composer">
                <div class="mode-model-row">
                  <select id="assistantProviderSelect" class="mode-model-select" aria-label="当前模型"></select>
                </div>
                <textarea id="chatInput" spellcheck="false" placeholder="输入消息"></textarea>
                <div id="chatAttachments" class="attachment-list"></div>
                <div class="action-row">
                  <input id="chatFileInput" type="file" multiple hidden />
                  <button id="chatAttachBtn" class="icon-btn" type="button" title="添加附件" aria-label="添加附件">+</button>
                  <button id="sendChatBtn" class="primary-btn" type="button">发送</button>
                  <button id="stopChatBtn" class="icon-btn" type="button" title="停止" aria-label="停止" disabled>■</button>
                </div>
              </div>
            </section>
          </section>

          <section class="view" id="settingsView">
            <div class="settings-layout">
              <section class="providers-section" aria-labelledby="providersTitle">
                <div class="providers-head">
                  <h2 id="providersTitle">Providers</h2>
                  <button id="addProviderBtn" class="icon-btn" type="button" title="新增 provider" aria-label="新增 provider">+</button>
                </div>
                <div id="providersList" class="providers-list"></div>
              </section>

              <div class="settings-footer">
                <button id="saveSettingsBtn" class="primary-btn" type="button">保存</button>
              </div>
            </div>
          </section>
        </main>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="index.js"></script>
  </body>
</html>
