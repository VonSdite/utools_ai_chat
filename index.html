<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <img src="logo.svg" alt="" class="brand-logo" />
          <strong>AI Agent</strong>
        </div>
        <nav class="side-tabs" aria-label="功能">
          <button class="side-tab is-active" type="button" data-tab="chat" title="对话" aria-label="对话">
            <span class="lucide-mask nav-lucide icon-message-circle" aria-hidden="true"></span>
            <span class="sr-only">对话</span>
          </button>
          <button class="side-tab" type="button" data-tab="translate" title="翻译" aria-label="翻译">
            <span class="lucide-mask nav-lucide icon-languages" aria-hidden="true"></span>
            <span class="sr-only">翻译</span>
          </button>
          <button class="side-tab" type="button" data-tab="summary" title="总结" aria-label="总结">
            <span class="lucide-mask nav-lucide icon-clipboard-list" aria-hidden="true"></span>
            <span class="sr-only">总结</span>
          </button>
          <button class="side-tab" type="button" data-tab="explain" title="解释" aria-label="解释">
            <span class="lucide-mask nav-lucide icon-book-open" aria-hidden="true"></span>
            <span class="sr-only">解释</span>
          </button>
          <button class="side-tab" type="button" data-tab="ocr" title="OCR" aria-label="OCR">
            <span class="lucide-mask nav-lucide icon-scan-text" aria-hidden="true"></span>
            <span class="sr-only">OCR</span>
          </button>
        </nav>
        <button class="side-tab settings-tab" type="button" data-tab="settings" title="设置" aria-label="设置">
          <span class="nav-icon nav-icon-settings" aria-hidden="true"></span>
          <span class="sr-only">设置</span>
        </button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="title-block">
            <h1 id="viewTitle">对话</h1>
          </div>
          <div class="topbar-actions">
            <button id="chatSearchBtn" class="icon-btn compact-btn topbar-search-btn" type="button" title="搜索会话" aria-label="搜索会话" hidden>
              <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.34-4.34" />
                <circle cx="11" cy="11" r="8" />
              </svg>
            </button>
          </div>
        </header>

        <main class="main">
          <section class="view" id="taskView">
            <section class="input-panel">
              <div class="mode-model-row">
                <select id="taskModelSelect" class="mode-model-select" aria-label="当前模型"></select>
              </div>
              <textarea id="inputText" spellcheck="false" placeholder="把小纸条放这里，我来认真读"></textarea>
              <div id="taskAttachments" class="attachment-list"></div>
              <div class="action-row">
                <input id="taskFileInput" type="file" multiple hidden />
                <button id="taskAttachBtn" class="icon-btn compact-btn attachment-btn" type="button" title="添加附件" aria-label="添加附件">
                  <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551" />
                  </svg>
                </button>
                <button id="clearTaskBtn" class="icon-btn compact-btn clear-action-btn" type="button" title="清空" aria-label="清空">
                  <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21" />
                    <path d="m5.082 11.09 8.828 8.828" />
                  </svg>
                </button>
                <button id="stopTaskBtn" class="icon-btn compact-btn stop-action-btn" type="button" title="停止" aria-label="停止" disabled>
                  <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <rect width="12" height="12" x="6" y="6" rx="2" />
                  </svg>
                </button>
                <button id="sendTaskBtn" class="icon-btn compact-btn send-action-btn" type="button" title="发送" aria-label="发送">
                  <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 3l18 9-18 9 4-9z" />
                    <path d="M7 12h14" />
                  </svg>
                </button>
              </div>
            </section>

            <section class="output-panel">
              <div class="panel-head">
                <h2>输出</h2>
                <div class="panel-actions">
                  <button id="continueChatBtn" class="secondary-btn compact-action" type="button" hidden>继续对话</button>
                  <button id="copyTaskBtn" class="icon-btn compact-btn" type="button" title="复制" aria-label="复制" disabled>
                    <svg class="tool-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
                      <rect width="14" height="14" x="8" y="8" rx="2" />
                      <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                    </svg>
                  </button>
                </div>
              </div>
              <div id="resultText" class="result-text markdown-body"></div>
            </section>
          </section>

          <section class="view is-active" id="chatView">
            <aside class="sessions-panel">
              <section id="assistantSection" class="assistant-section">
                <div class="sidebar-section-head">
                  <button id="assistantToggleBtn" class="assistant-toggle" type="button" aria-expanded="false" aria-label="选择助手">
                    <strong id="currentAssistantName">未命名助手</strong>
                  </button>
                </div>
                <div id="assistantsList" class="assistants-list"></div>
                <button id="newAssistantBtn" class="assistant-add-btn" type="button" title="新建助手" aria-label="新建助手">
                  <span class="assistant-add-icon" aria-hidden="true">+</span>
                  <span>新建助手</span>
                </button>
                <div class="assistant-editor">
                  <label class="field">
                    <span>名称</span>
                    <input id="assistantNameInput" />
                  </label>
                  <label class="field">
                    <span>Prompt</span>
                    <textarea id="assistantPromptInput" spellcheck="false"></textarea>
                  </label>
                </div>
              </section>

              <section class="topic-section">
                <div class="sidebar-section-head">
                  <span>话题</span>
                </div>
                <div id="sessionsList" class="sessions-list"></div>
              </section>
            </aside>

            <section class="chat-panel">
              <div id="messagesList" class="messages-list"></div>
              <div class="chat-composer">
                <div class="chat-input-wrap">
                  <textarea id="chatInput" spellcheck="false" placeholder="想问什么，悄悄告诉我" aria-controls="chatSlashMenu" aria-expanded="false"></textarea>
                  <div id="chatSlashMenu" class="chat-slash-menu" role="listbox" hidden></div>
                </div>
                <div id="chatAttachments" class="attachment-list"></div>
                <div class="action-row">
                  <input id="chatFileInput" type="file" multiple hidden />
                  <button id="chatSidebarToggleBtn" class="icon-btn compact-btn chat-sidebar-toggle" type="button" title="隐藏侧边栏" aria-label="隐藏侧边栏" aria-expanded="true">
                    <svg class="tool-icon sidebar-close-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <rect width="18" height="18" x="3" y="3" rx="2" />
                      <path d="M9 3v18" />
                      <path d="m16 15-3-3 3-3" />
                    </svg>
                    <svg class="tool-icon sidebar-open-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <rect width="18" height="18" x="3" y="3" rx="2" />
                      <path d="M9 3v18" />
                      <path d="m14 9 3 3-3 3" />
                    </svg>
                  </button>
                  <button id="newSessionBtn" class="icon-btn compact-btn" type="button" title="新对话" aria-label="新对话">
                    <svg class="tool-icon" width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z" />
                      <path d="M10 15h4" />
                      <path d="M10 9h4" />
                      <path d="M12 7v4" />
                    </svg>
                  </button>
                  <button id="chatAttachBtn" class="icon-btn compact-btn attachment-btn" type="button" title="添加附件" aria-label="添加附件">
                    <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551" />
                    </svg>
                  </button>
                  <button id="clearContextBtn" class="icon-btn compact-btn clear-context-btn" type="button" title="清除对话上下文" aria-label="清除对话上下文">
                    <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21" />
                      <path d="m5.082 11.09 8.828 8.828" />
                    </svg>
                  </button>
                  <button id="clearChatBtn" class="icon-btn compact-btn" type="button" title="清空当前对话记录" aria-label="清空当前对话记录">
                    <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M3 6h18" />
                      <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                      <path d="M10 11v6" />
                      <path d="M14 11v6" />
                    </svg>
                  </button>
                  <span class="action-spacer" aria-hidden="true"></span>
                  <select id="assistantProviderSelect" class="mode-model-select chat-action-model-select" aria-label="当前模型"></select>
                  <button id="stopChatBtn" class="icon-btn compact-btn stop-action-btn" type="button" title="停止" aria-label="停止" disabled>
                    <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <rect width="12" height="12" x="6" y="6" rx="2" />
                    </svg>
                  </button>
                  <button id="sendChatBtn" class="icon-btn compact-btn send-action-btn" type="button" title="发送" aria-label="发送">
                    <svg class="tool-icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M3 3l18 9-18 9 4-9z" />
                      <path d="M7 12h14" />
                    </svg>
                  </button>
                </div>
              </div>
            </section>
          </section>

          <section class="view" id="settingsView">
            <div class="settings-layout">
              <section class="settings-band" aria-labelledby="dataTitle">
                <div class="settings-head">
                  <h2 id="dataTitle">数据</h2>
                </div>
                <label class="field field-full">
                  <span>数据目录</span>
                  <div class="data-dir-control">
                    <input id="dataDirInput" autocomplete="off" spellcheck="false" />
                    <button id="chooseDataDirBtn" class="icon-btn compact-btn data-dir-picker" type="button" title="选择目录" aria-label="选择目录">
                      <span class="lucide-mask icon-folder-open" aria-hidden="true"></span>
                    </button>
                  </div>
                </label>
                <label class="field">
                  <span class="field-label">
                    剪贴板有效时间（秒）
                    <span
                      class="help-tip"
                      role="button"
                      tabindex="0"
                      aria-label="剪贴板有效时间说明：用于完整命令进入时读取最近复制文本或图片的时间窗口；OCR 可同时带入文本和图片，但需要图片才会自动发送。"
                      data-tooltip="用于完整命令进入时读取最近复制文本或图片的时间窗口；OCR 可同时带入文本和图片，但需要图片才会自动发送。"
                    >?</span>
                  </span>
                  <input id="clipboardWindowInput" type="number" min="0" step="0.5" />
                </label>
                <label class="field">
                  <span>剪贴板轮询间隔（毫秒）</span>
                  <input id="clipboardPollingInput" type="number" min="100" step="50" />
                </label>
                <label class="field">
                  <span>插件代理</span>
                  <select id="pluginProxyModeSelect">
                    <option value="direct">直连模式</option>
                    <option value="system">系统代理</option>
                    <option value="custom">自定义代理</option>
                  </select>
                </label>
                <label id="pluginProxyUrlField" class="field" hidden>
                  <span>自定义代理 URL</span>
                  <input id="pluginProxyUrlInput" autocomplete="off" spellcheck="false" placeholder="http://127.0.0.1:7890" />
                </label>
              </section>

              <section class="providers-section" aria-labelledby="providersTitle">
                <div class="providers-head">
                  <h2 id="providersTitle">Providers</h2>
                  <button id="addProviderBtn" class="icon-btn" type="button" title="新增 provider" aria-label="新增 provider">+</button>
                </div>
                <div id="providersList" class="providers-list"></div>
              </section>

            </div>
          </section>
        </main>
      </section>
    </div>

    <div id="imagePreviewOverlay" class="image-preview-overlay" hidden>
      <div class="image-preview-dialog" role="dialog" aria-modal="true" aria-label="图片预览">
        <button id="imagePreviewCloseBtn" class="icon-btn compact-btn" type="button" title="关闭" aria-label="关闭">×</button>
        <img id="imagePreviewImg" alt="" />
      </div>
    </div>

    <div id="chatSearchOverlay" class="chat-search-overlay" hidden>
      <section class="chat-search-dialog" role="dialog" aria-modal="true" aria-labelledby="chatSearchTitle">
        <header class="chat-search-head">
          <h2 id="chatSearchTitle">搜索会话</h2>
          <button id="chatSearchCloseBtn" class="ghost-btn icon-btn" type="button" title="关闭" aria-label="关闭">×</button>
        </header>
        <div class="chat-search-body">
          <label class="sr-only" for="chatSearchInput">搜索关键词</label>
          <div class="chat-search-input-wrap">
            <svg class="tool-icon" width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.34-4.34" />
              <circle cx="11" cy="11" r="8" />
            </svg>
            <input id="chatSearchInput" type="search" placeholder="搜索所有助手和会话" autocomplete="off" spellcheck="false" />
          </div>
          <div id="chatSearchMeta" class="chat-search-meta"></div>
          <div id="chatSearchResults" class="chat-search-results"></div>
        </div>
      </section>
    </div>

    <div id="providerDialogOverlay" class="provider-dialog-overlay" hidden>
      <section class="provider-dialog" role="dialog" aria-modal="true" aria-labelledby="providerDialogTitle">
        <header class="provider-dialog-head">
          <h2 id="providerDialogTitle">新增 Provider</h2>
          <button id="providerDialogCloseBtn" class="ghost-btn icon-btn" type="button" title="关闭" aria-label="关闭">×</button>
        </header>
        <div class="provider-dialog-body">
          <label class="field">
            <span>Provider 名称 <b class="required-star">*</b></span>
            <input id="providerDialogName" autocomplete="off" spellcheck="false" required />
          </label>
          <label class="field field-full">
            <span>API 地址 <b class="required-star">*</b></span>
            <input id="providerDialogEndpoint" placeholder="https://example.com/v1/chat/completions" autocomplete="off" spellcheck="false" required />
          </label>
          <label class="field field-full">
            <span>API Key</span>
            <input id="providerDialogApiKey" type="password" placeholder="可为空" autocomplete="off" />
          </label>
          <div class="field-full models-block">
            <div class="models-head">
              <span>模型</span>
              <div class="models-actions">
                <button id="providerDialogFetchModelsBtn" class="icon-btn compact-btn" type="button" title="拉取模型" aria-label="拉取模型">↻</button>
                <button id="providerDialogAddModelBtn" class="icon-btn compact-btn" type="button" title="添加模型" aria-label="添加模型">+</button>
              </div>
            </div>
            <div id="providerDialogModelsList"></div>
          </div>
        </div>
        <footer class="provider-dialog-foot">
          <button id="providerDialogCancelBtn" class="secondary-btn" type="button">取消</button>
          <button id="providerDialogCreateBtn" class="primary-btn" type="button">创建</button>
        </footer>
      </section>
    </div>

    <div id="confirmOverlay" class="confirm-overlay" hidden>
      <section class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
        <h2 id="confirmTitle">确认操作</h2>
        <p id="confirmMessage"></p>
        <div class="confirm-actions">
          <button id="confirmCancelBtn" class="secondary-btn" type="button">取消</button>
          <button id="confirmOkBtn" class="danger-btn" type="button">删除</button>
        </div>
      </section>
    </div>

    <div id="modelPickerOverlay" class="model-picker-overlay" hidden></div>
    <button id="selectionSpeakBtn" class="selection-speech-btn icon-btn compact-btn" type="button" title="朗读选中文本" aria-label="朗读选中文本" aria-pressed="false" hidden>
      <svg class="tool-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11 5 6 9H3v6h3l5 4z" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
    </button>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="vendor/markdown-it.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
